<%
require "cgi"
require "uri"

def first_present(*values)
  values.find { |value| value && !value.empty? }
end

def derived_test_database_url(url)
  return nil if url.nil? || url.empty?

  uri = URI.parse(url)
  database_name = CGI.unescape(uri.path.to_s.delete_prefix("/"))
  return url if database_name.empty?

  encoded_name = CGI.escape("#{database_name}_test").gsub("+", "%20")
  uri.path = "/#{encoded_name}"
  uri.to_s
rescue URI::InvalidURIError
  url
end

default_database_url = first_present(ENV["DEV_DATABASE_URL"], ENV["DATABASE_URL"])
%>

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= default_database_url %>

test:
  <<: *default
  url: <%= first_present(ENV["TEST_DATABASE_URL"], derived_test_database_url(default_database_url)) %>

production:
  url: <%= ENV["DATABASE_URL"] %>
